<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobSeeker — Internship Tracker</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.3px; }
    header h1 span { color: #4a9eff; }
    #last-updated { font-size: 0.78rem; color: #8899aa; }

    /* ── Main layout ── */
    main { max-width: 1400px; margin: 0 auto; padding: 24px 24px 48px; }

    /* ── Stats row ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #fff;
      border-radius: 10px;
      padding: 16px 20px;
      border: 1px solid #e2e8f0;
    }
    .stat-card .label { font-size: 0.72rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; color: #1a1a2e; line-height: 1; }
    .stat-card.new .value  { color: #f59e0b; }
    .stat-card.sf  .value  { color: #0070D2; }
    .stat-card.ai  .value  { color: #9B59B6; }
    .stat-card.ml  .value  { color: #27AE60; }

    /* ── Filters ── */
    .filters {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-group label { font-size: 0.72rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    .filters input[type="text"],
    .filters select {
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 0.85rem;
      color: #1a1a2e;
      background: #f8fafc;
      outline: none;
      transition: border-color 0.15s;
    }
    .filters input[type="text"]:focus,
    .filters select:focus { border-color: #4a9eff; background: #fff; }
    #search { width: 220px; }

    /* Category toggle buttons */
    .cat-buttons { display: flex; gap: 6px; }
    .cat-btn {
      border: 1.5px solid #e2e8f0;
      background: #f8fafc;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      color: #64748b;
      font-weight: 500;
      transition: all 0.15s;
    }
    .cat-btn.active-sf  { background: #dbeafe; border-color: #0070D2; color: #0070D2; }
    .cat-btn.active-ai  { background: #f3e8ff; border-color: #9B59B6; color: #9B59B6; }
    .cat-btn.active-ml  { background: #dcfce7; border-color: #27AE60; color: #27AE60; }

    /* Refresh button */
    #refresh-btn {
      margin-left: auto;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 0.83rem;
      cursor: pointer;
      align-self: flex-end;
      transition: background 0.15s;
    }
    #refresh-btn:hover { background: #2d2d4e; }

    /* ── Results bar ── */
    .results-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .results-bar span { font-size: 0.85rem; color: #64748b; }
    .results-bar strong { color: #1a1a2e; }

    /* ── Table ── */
    .table-wrap {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      overflow: auto;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    thead tr { background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
    th {
      padding: 11px 14px;
      text-align: left;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #64748b;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    th:hover { color: #1a1a2e; }
    th .sort-arrow { margin-left: 4px; opacity: 0.4; font-size: 0.65rem; }
    th.sorted .sort-arrow { opacity: 1; }
    td { padding: 11px 14px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }

    /* Category badge */
    .badge {
      display: inline-block;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.73rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-sf { background: #dbeafe; color: #0070D2; }
    .badge-ai { background: #f3e8ff; color: #9B59B6; }
    .badge-ml { background: #dcfce7; color: #27AE60; }

    /* OPT badge */
    .opt-yes { color: #27AE60; font-weight: 600; font-size: 0.8rem; }
    .opt-no  { color: #ef4444; font-weight: 600; font-size: 0.8rem; }
    .opt-unk { color: #94a3b8; font-size: 0.8rem; }

    /* Apply link */
    .apply-link {
      display: inline-block;
      background: #4a9eff;
      color: #fff;
      border-radius: 5px;
      padding: 4px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .apply-link:hover { background: #1a7aee; }

    /* Keywords */
    .keywords { color: #64748b; font-size: 0.78rem; max-width: 160px; }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #94a3b8;
    }
    .empty p { margin-top: 8px; font-size: 0.85rem; }

    /* Loading */
    #loading {
      text-align: center;
      padding: 80px 20px;
      color: #64748b;
      font-size: 0.9rem;
    }

    /* Error */
    #error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 16px;
      font-size: 0.85rem;
      display: none;
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .stats { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
      main { padding: 16px; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      #search { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <h1>🎯 <span>JobSeeker</span> — Internship Tracker</h1>
  <span id="last-updated">Loading…</span>
</header>

<main>
  <div id="error-msg"></div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="label">Total Listings</div>
      <div class="value" id="stat-total">—</div>
    </div>
    <div class="stat-card new">
      <div class="label">New (Last 24h)</div>
      <div class="value" id="stat-new">—</div>
    </div>
    <div class="stat-card sf">
      <div class="label">Salesforce</div>
      <div class="value" id="stat-sf">—</div>
    </div>
    <div class="stat-card ai">
      <div class="label">AI Engineering</div>
      <div class="value" id="stat-ai">—</div>
    </div>
    <div class="stat-card ml">
      <div class="label">Data Science / ML</div>
      <div class="value" id="stat-ml">—</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <div class="filter-group">
      <label>Search</label>
      <input type="text" id="search" placeholder="Title, company, keyword…" />
    </div>

    <div class="filter-group">
      <label>Category</label>
      <div class="cat-buttons">
        <button class="cat-btn active-sf" data-cat="salesforce">Salesforce</button>
        <button class="cat-btn active-ai" data-cat="ai_eng">AI Eng</button>
        <button class="cat-btn active-ml" data-cat="ds_ml">DS / ML</button>
      </div>
    </div>

    <div class="filter-group">
      <label>Company</label>
      <select id="filter-company">
        <option value="">All companies</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Work Auth</label>
      <select id="filter-opt">
        <option value="">All</option>
        <option value="yes">✅ OPT/CPT</option>
        <option value="no">❌ No OPT</option>
        <option value="unknown">❓ Unknown</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Discovered</label>
      <select id="filter-date">
        <option value="0">All time</option>
        <option value="1">Last 24 hours</option>
        <option value="7">Last 7 days</option>
        <option value="30">Last 30 days</option>
      </select>
    </div>

    <button id="refresh-btn">↻ Refresh</button>
  </div>

  <!-- Results count -->
  <div class="results-bar">
    <span id="results-count"></span>
  </div>

  <!-- Table -->
  <div class="table-wrap" id="table-wrap">
    <div id="loading">Loading jobs…</div>
  </div>
</main>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  // When served via GitHub Pages, jobs.json is at the same origin.
  // Update this path if your repo name differs (e.g. "/your-repo/data/jobs.json").
  const JOBS_URL = "./data/jobs.json";

  // ── State ─────────────────────────────────────────────────────────────────
  let allJobs = [];
  let activeCats = new Set(["salesforce", "ai_eng", "ds_ml"]);
  let sortCol = "discovered_at";
  let sortAsc = false;

  // ── Helpers ───────────────────────────────────────────────────────────────
  const CAT_LABEL = {
    salesforce: "Salesforce Dev/Arch",
    ai_eng:     "AI Engineering",
    ds_ml:      "Data Science / ML",
  };
  const CAT_CLASS = { salesforce: "badge-sf", ai_eng: "badge-ai", ds_ml: "badge-ml" };

  function fmtDate(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    return isNaN(d) ? "—" : d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  }

  function fmtDateTime(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    return isNaN(d) ? "—" : d.toLocaleString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit", timeZoneName: "short" });
  }

  function optLabel(val) {
    if (val === true)  return '<span class="opt-yes">✅ OPT/CPT</span>';
    if (val === false) return '<span class="opt-no">❌ No OPT</span>';
    return '<span class="opt-unk">❓ Unknown</span>';
  }

  function optFilterMatch(val, filterVal) {
    if (!filterVal) return true;
    if (filterVal === "yes")     return val === true;
    if (filterVal === "no")      return val === false;
    if (filterVal === "unknown") return val !== true && val !== false;
    return true;
  }

  function esc(str) {
    return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // ── Load data ─────────────────────────────────────────────────────────────
  async function loadJobs() {
    document.getElementById("loading").style.display = "block";
    document.getElementById("error-msg").style.display = "none";

    try {
      const res = await fetch(JOBS_URL + "?t=" + Date.now());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      allJobs = data.jobs || [];

      // Update last updated
      const lu = data.last_updated;
      document.getElementById("last-updated").textContent =
        lu ? "Last updated: " + fmtDateTime(lu) : "Last updated: Never";

      // Populate company dropdown
      const companies = [...new Set(allJobs.map(j => j.company_name).filter(Boolean))].sort();
      const sel = document.getElementById("filter-company");
      sel.innerHTML = '<option value="">All companies</option>';
      companies.forEach(c => {
        const o = document.createElement("option");
        o.value = c; o.textContent = c;
        sel.appendChild(o);
      });

      updateStats(allJobs);
      render();
    } catch (e) {
      document.getElementById("loading").style.display = "none";
      const err = document.getElementById("error-msg");
      err.style.display = "block";
      err.textContent = "Could not load jobs.json: " + e.message +
        " — Make sure GitHub Pages is enabled and the repo is pushed.";
    }
  }

  // ── Stats ─────────────────────────────────────────────────────────────────
  function updateStats(jobs) {
    const now = Date.now();
    const h24 = now - 24 * 60 * 60 * 1000;
    document.getElementById("stat-total").textContent = jobs.length;
    document.getElementById("stat-new").textContent  = jobs.filter(j => new Date(j.discovered_at) >= h24).length;
    document.getElementById("stat-sf").textContent   = jobs.filter(j => j.role_category === "salesforce").length;
    document.getElementById("stat-ai").textContent   = jobs.filter(j => j.role_category === "ai_eng").length;
    document.getElementById("stat-ml").textContent   = jobs.filter(j => j.role_category === "ds_ml").length;
  }

  // ── Filtering ─────────────────────────────────────────────────────────────
  function getFiltered() {
    const search  = document.getElementById("search").value.toLowerCase().trim();
    const company = document.getElementById("filter-company").value;
    const opt     = document.getElementById("filter-opt").value;
    const days    = parseInt(document.getElementById("filter-date").value, 10);
    const cutoff  = days > 0 ? Date.now() - days * 86400 * 1000 : 0;

    return allJobs.filter(j => {
      if (!activeCats.has(j.role_category)) return false;
      if (company && j.company_name !== company) return false;
      if (!optFilterMatch(j.opt_cpt, opt)) return false;
      if (cutoff && new Date(j.discovered_at).getTime() < cutoff) return false;
      if (search) {
        const haystack = [j.title, j.company_name, ...(j.keywords_matched || [])].join(" ").toLowerCase();
        if (!haystack.includes(search)) return false;
      }
      return true;
    });
  }

  // ── Sorting ───────────────────────────────────────────────────────────────
  function sortJobs(jobs) {
    return [...jobs].sort((a, b) => {
      let va = a[sortCol] ?? "", vb = b[sortCol] ?? "";
      if (sortCol === "discovered_at" || sortCol === "posted_at") {
        va = new Date(va).getTime() || 0;
        vb = new Date(vb).getTime() || 0;
      } else {
        va = String(va).toLowerCase();
        vb = String(vb).toLowerCase();
      }
      if (va < vb) return sortAsc ? -1 : 1;
      if (va > vb) return sortAsc ? 1 : -1;
      return 0;
    });
  }

  // ── Render table ──────────────────────────────────────────────────────────
  const COLS = [
    { key: "company_name",  label: "Company" },
    { key: "title",         label: "Title" },
    { key: "role_category", label: "Category" },
    { key: "location",      label: "Location" },
    { key: "posted_at",     label: "Posted" },
    { key: "opt_cpt",       label: "Work Auth" },
    { key: "keywords_matched", label: "Keywords" },
    { key: "url",           label: "Apply" },
    { key: "discovered_at", label: "Discovered" },
  ];

  function render() {
    const wrap = document.getElementById("table-wrap");
    document.getElementById("loading").style.display = "none";

    const filtered = getFiltered();
    const sorted   = sortJobs(filtered);

    document.getElementById("results-count").innerHTML =
      `<strong>${sorted.length}</strong> listing${sorted.length !== 1 ? "s" : ""} found`;

    if (sorted.length === 0) {
      wrap.innerHTML = `<div class="empty"><div style="font-size:2rem">🔍</div><p>No listings match your filters.</p></div>`;
      return;
    }

    const thead = COLS.map(c => {
      const arrow = c.key === sortCol ? (sortAsc ? "▲" : "▼") : "▲";
      const cls = c.key === sortCol ? "sorted" : "";
      return `<th class="${cls}" data-col="${c.key}">${c.label} <span class="sort-arrow">${arrow}</span></th>`;
    }).join("");

    const rows = sorted.map(j => {
      const cat    = j.role_category || "";
      const badge  = `<span class="badge ${CAT_CLASS[cat] || ''}">${esc(CAT_LABEL[cat] || cat)}</span>`;
      const kwds   = Array.isArray(j.keywords_matched) ? j.keywords_matched.join(", ") : (j.keywords_matched || "");
      const apply  = j.url ? `<a class="apply-link" href="${esc(j.url)}" target="_blank" rel="noopener">Apply →</a>` : "—";

      return `<tr>
        <td><strong>${esc(j.company_name)}</strong></td>
        <td>${esc(j.title)}</td>
        <td>${badge}</td>
        <td>${esc(j.location || "—")}</td>
        <td>${fmtDate(j.posted_at)}</td>
        <td>${optLabel(j.opt_cpt)}</td>
        <td class="keywords">${esc(kwds)}</td>
        <td>${apply}</td>
        <td style="white-space:nowrap;font-size:0.78rem;color:#64748b">${fmtDateTime(j.discovered_at)}</td>
      </tr>`;
    }).join("");

    wrap.innerHTML = `<table><thead><tr>${thead}</tr></thead><tbody>${rows}</tbody></table>`;

    // Sort listeners
    wrap.querySelectorAll("th[data-col]").forEach(th => {
      th.addEventListener("click", () => {
        const col = th.dataset.col;
        if (sortCol === col) sortAsc = !sortAsc;
        else { sortCol = col; sortAsc = true; }
        render();
      });
    });
  }

  // ── Event listeners ───────────────────────────────────────────────────────
  document.getElementById("search").addEventListener("input", render);
  document.getElementById("filter-company").addEventListener("change", render);
  document.getElementById("filter-opt").addEventListener("change", render);
  document.getElementById("filter-date").addEventListener("change", render);
  document.getElementById("refresh-btn").addEventListener("click", loadJobs);

  // Category toggle buttons
  document.querySelectorAll(".cat-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const cat = btn.dataset.cat;
      if (activeCats.has(cat)) {
        // Don't deselect last one
        if (activeCats.size > 1) { activeCats.delete(cat); btn.className = "cat-btn"; }
      } else {
        activeCats.add(cat);
        btn.className = "cat-btn active-" + (cat === "salesforce" ? "sf" : cat === "ai_eng" ? "ai" : "ml");
      }
      render();
    });
  });

  // ── Auto-refresh every 5 minutes ──────────────────────────────────────────
  setInterval(loadJobs, 5 * 60 * 1000);

  // ── Init ──────────────────────────────────────────────────────────────────
  loadJobs();
</script>

</body>
</html>
