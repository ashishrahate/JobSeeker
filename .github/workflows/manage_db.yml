name: Manage Database

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - stats
          - archive
          - purge
      days:
        description: "Days threshold for archive (only used when action=archive, default: 60)"
        required: false
        default: "60"

permissions:
  contents: write

jobs:
  manage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run DB action
        run: |
          if [ "${{ inputs.action }}" = "stats" ]; then
            python -m fetcher.db stats
          elif [ "${{ inputs.action }}" = "archive" ]; then
            python -m fetcher.db archive --days ${{ inputs.days }}
          elif [ "${{ inputs.action }}" = "purge" ]; then
            python -m fetcher.db purge
          fi

      - name: Commit changes
        if: ${{ inputs.action != 'stats' }}
        run: |
          git config --global user.name "JobSeeker Bot"
          git config --global user.email "jobseeker-bot@users.noreply.github.com"
          git add data/jobs.db data/jobs.json
          git diff --staged --quiet || git commit -m "chore: db ${{ inputs.action }} [skip ci]"
          git push
